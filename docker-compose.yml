version: "3"
services:
  vova-games:
    build: .
    container_name: vova-games
    ports:
      - "3040:80"
    restart: unless-stopped
    depends_on:
      - relay

  relay:
    build: ./server
    container_name: eldoria-relay
    restart: unless-stopped
    expose:
      - "8080"
    networks:
      - default

networks:
  default:
    driver: bridge

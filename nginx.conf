# Стандартный map для WebSocket — когда $http_upgrade пустой (обычный HTTP),
# Connection ставится в "close"; когда "websocket" — в "upgrade".
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # No cache for development
    add_header Cache-Control "no-store, no-cache, must-revalidate";

    # Correct MIME types for JS modules
    types {
        text/html html;
        text/css css;
        application/javascript js mjs;
        application/json json;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Coop WebSocket relay
    location /ws {
        proxy_pass http://relay:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # Gzip compression
    gzip on;
    gzip_types text/html text/css application/javascript application/json;
}
